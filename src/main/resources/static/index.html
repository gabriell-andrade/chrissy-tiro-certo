<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chrissy Tiro Certo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            padding: 40px;
        }

        /* FORM */
        .form {
            margin-bottom: 20px;
        }

        /* AUTOCOMPLETE */
        .autocomplete {
            position: relative;
            display: inline-block;
            margin: 10px;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: 200px;
        }

        .dropdown {
            position: absolute;
            background: #1e293b;
            width: 100%;
            border-radius: 8px;
            margin-top: 5px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .dropdown div {
            padding: 10px;
            cursor: pointer;
            text-align: left;
        }

        .dropdown div:hover {
            background: #334155;
        }

        /* BUTTON */
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled {
            background: gray;
        }

        /* CARDS */
        .container {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            min-width: 250px;
            max-width: 350px;
            flex: 1;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .stat {
            margin: 8px 0;
        }

        /* BADGES */
        .badge {
            padding: 5px 10px;
            border-radius: 8px;
            margin-left: 8px;
            font-size: 12px;
        }

        .high { background: #16a34a; }
        .medium { background: #ca8a04; }
        .low { background: #dc2626; }

        /* LOADER */
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #22c55e;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<h1>⚽ Chrissy Tiro Certo</h1>

<div class="form">

    <!-- TIME A -->
    <div class="autocomplete">
        <input type="text" id="teamAInput" placeholder="Time A">
        <div id="dropdownA" class="dropdown"></div>
    </div>

    <!-- TIME B -->
    <div class="autocomplete">
        <input type="text" id="teamBInput" placeholder="Time B">
        <div id="dropdownB" class="dropdown"></div>
    </div>

    <br><br>

    <button onclick="analyze()" id="btn">Analisar</button>

</div>

<div id="loading"></div>
<div id="result" class="container"></div>

<script>
    let teamAId = null;
    let teamBId = null;

    /* DEBOUNCE */
    function debounce(func, delay) {
        let timeout;
        return (...args) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => func(...args), delay);
        };
    }

    /* BUSCA TIMES */
    async function fetchTeams(query, dropdown, setId, input) {

        if (query.length < 2) {
            dropdown.innerHTML = "";
            return;
        }

        try {
            const res = await fetch(`http://localhost:8080/analysis/teams?search=${query}`);
            const data = await res.json();

            dropdown.innerHTML = "";

            data.forEach(team => {
                const div = document.createElement("div");
                div.innerText = team.name;

                div.onclick = () => {
                    input.value = team.name;
                    setId(team.id);
                    dropdown.innerHTML = "";
                };

                dropdown.appendChild(div);
            });

        } catch (e) {
            dropdown.innerHTML = "<div>Erro ao buscar</div>";
        }
    }

    /* INPUTS */
    const teamAInput = document.getElementById("teamAInput");
    const teamBInput = document.getElementById("teamBInput");

    const dropdownA = document.getElementById("dropdownA");
    const dropdownB = document.getElementById("dropdownB");

    const debouncedA = debounce((value) => {
        fetchTeams(value, dropdownA, (id) => teamAId = id, teamAInput);
    }, 300);

    const debouncedB = debounce((value) => {
        fetchTeams(value, dropdownB, (id) => teamBId = id, teamBInput);
    }, 300);

    teamAInput.addEventListener("input", e => debouncedA(e.target.value));
    teamBInput.addEventListener("input", e => debouncedB(e.target.value));

    /* BADGE */
    function getConfidenceClass(c) {
        if (c >= 75) return "high";
        if (c >= 60) return "medium";
        return "low";
    }

    /* ANALYZE */
    async function analyze() {

        if (!teamAId || !teamBId) {
            alert("Selecione os dois times!");
            return;
        }

        const btn = document.getElementById("btn");
        const loading = document.getElementById("loading");
        const result = document.getElementById("result");

        btn.disabled = true;
        loading.innerHTML = '<div class="loader"></div>';
        result.innerHTML = "";

        try {
            const res = await fetch(`http://localhost:8080/analysis?teamA=${teamAId}&teamB=${teamBId}`);
            const data = await res.json();

            let html = "";

            html += `<div class="card">
                <h2>${data.teamA.teamName}</h2>
                <p class="stat">⚽ ${data.teamA.averageGoals.toFixed(2)}</p>
            </div>`;

            html += `<div class="card">
                <h2>${data.teamB.teamName}</h2>
                <p class="stat">⚽ ${data.teamB.averageGoals.toFixed(2)}</p>
            </div>`;

            html += `<div class="card"><h2>🎯 Sugestões</h2>`;

            data.suggestions.forEach(s => {
                html += `<p>
                    ${s.market} - ${s.pick}
                    <span class="badge ${getConfidenceClass(s.confidence)}">
                        ${s.confidence}%
                    </span>
                </p>`;
            });

            html += `</div>`;

            result.innerHTML = html;

        } catch (e) {
            result.innerHTML = "Erro ao analisar";
        }

        loading.innerHTML = "";
        btn.disabled = false;
    }
</script>

</body>
</html>
